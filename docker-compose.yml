version: "3.9"

services:
  whatsapp-server:
    build: .
    container_name: wa_server
    restart: unless-stopped

    # KVM لتسريع الـ emulator (مطلوب على Linux)
    devices:
      - /dev/kvm:/dev/kvm

    ports:
      - "5000:5000"   # Flask API
      - "5900:5900"   # VNC raw
      - "6080:6080"   # noVNC web

    environment:
      PORT: 5000
      VNC_PORT: 5900
      NOVNC_PORT: 6080
      APPIUM_URL: "http://localhost:4723/wd/hub"
      # عند النشر على السيرفر غيّر هذا للـ IP الخارجي
      SERVER_HOST: "localhost"

    # ذاكرة: الـ emulator يحتاج على الأقل 4 GB
    mem_limit: 6g
    shm_size: 2g

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
